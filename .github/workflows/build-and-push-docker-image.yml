name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: developer5@rdltech.in
          password: Ce=UmdQ7KFmV7nZ%%

      - name: Prepare tags
        id: prep
        run: |
          # Use a sanitized version of the username for the Docker image name
          # (Docker Hub usernames cannot contain @ or dots)
          DOCKER_USER="developer5" 
          DOCKER_IMAGE=${DOCKER_USER}/rdl-fe
          VERSION=latest
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            VERSION=latest
          elif [[ $GITHUB_REF == refs/heads/develop ]]; then
            VERSION=develop
          fi
          TAGS="${DOCKER_IMAGE}:${VERSION},${DOCKER_IMAGE}:${GITHUB_SHA::7}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "Tags generated: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
